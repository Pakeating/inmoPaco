
networks:
  microservices-network:
    driver: bridge
  public-tunnel-network:
    driver: bridge
services:

# SERVICIOS DE INFRAESTRUCTURA:

  # --- CONFIG SERVICE V3---
  config-service-v3:
    build:
      context: ../ConfigServiceV3
    container_name: config-service-v3
    hostname: config-service-v3
    ports:
      - "8888:8888"
    volumes:
      # archivos locales en el config
      #      - ./configs:/app/resources/configurations
      # archivos en deployment/config
      - ./configurations:/app/config-repo
    environment:
      - SPRING_PROFILES_ACTIVE=native
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      admin-server:
        condition: service_healthy
    networks:
      - microservices-network

  # --- API GATEWAY V3 ---
  api-gateway-v3:
    build:
      context: ../APIGatewayV3
    container_name: api-gateway-v3
    ports:
      - "8080:8080"
    depends_on:
      config-service-v3:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service-v3:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false     #failfast y reintentos forzados para que reconecte si esta inestable
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MULTIPLIER=1.5
      #      Desactivado EUREKA
      #      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
    networks:
      - microservices-network
      - public-tunnel-network

  # --- ADMIN ---
  admin-server:
    build:
      context: ../Admin
    container_name: admin-server
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/actuator/health" ]
      interval: 5s
      retries: 10
      start_period: 5s
    environment:
      - SPRING_BOOT_ADMIN_CONTEXT_PATH=/admin
    networks:
      - microservices-network


  # --- ACTUALIZADOR AUTOMÁTICO ---
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Forzamos la versión exacta que soporta tu Server Engine
      - DOCKER_API_VERSION=1.52
    command: --interval 30 --cleanup
    networks:
      - microservices-network

#   --- CONECTOR DE CLOUDFLARE TUNNELS ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    networks:
      - public-tunnel-network
    environment: ## TODO: CAMBIAR POR VARIABLE DE ENTORNO, NO PUEDE ESTAR EN EL REPOSITORIO
      - TUNNEL_TOKEN=eyJhIjoiYmJhMDUzZWI0OTI5YzU1NTMzY2I0MjFjZjk3YzA3NjciLCJ0IjoiMTU1NDI0MzktODEzMy00YWI5LWI3YjUtNWQ1ZDc4MGMzZmIxIiwicyI6IlpXUXpNekkwWVdVdFpUQXhPQzAwWXpkbExXSTJNVGt0TlRFeVpqZzJaREUwTlRJMCJ9 #${CLOUDFLARE_TUNNEL_TOKEN} #VARIABLE DE ENTORNO PARA EL TOKEN
    command: tunnel --no-autoupdate run
#    depends_on:
#      - gateway

  # --- COLAS MENSAJERIA ---
  nats-server:
    image: nats:2.10-alpine
    container_name: nats-server
    ports:
      - "4222:4222" # Puerto para clientes
      - "8222:8222" # Puerto de monitoreo HTTP (Métricas)
    command: [
      "-js",                 # JetStream (Persistencia)
      "-m", "8222",          # servidor de monitoreo HTTP
      "--sd", "/data"        # directorio donde se guardarán los mensajes persistentes
    ]
    volumes:
      - ./nats_data:/data    # persistencia
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 64M        #deberia ser suficiente...

  # --- NATS DASHBOARD ---
  nats-dashboard:
    image: mdawar/nats-dashboard:latest
    container_name: nats-dashboard
    ports:
      - "8282:80" # Mapeamos el 8080 interno al 8282 para no chocar con el Gateway
    environment:
      - REVERSE_PROXY_UPSTREAM=nats-server:8222
    depends_on:
      - nats-server
    networks:
      - microservices-network

  # --- DATABASES ---
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: always
    # Para minimizar la huella de memoria, si escala habra que subirlo:
    command: [
      "mysqld",
      "--performance-schema=OFF",
      "--innodb-buffer-pool-size=64M",
      "--innodb-log-buffer-size=8M",
      "--max-connections=20",
      "--key-buffer-size=16M",
      "--query-cache-size=0",
      "--query-cache-type=0",
      "--skip-name-resolve"
    ]
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass #TODO: CAMBIAR POR VARIABLE DE ENTORNO
      - MYSQL_DATABASE=app_db
      - MYSQL_USER=admin_user         #TODO: CAMBIAR POR VARIABLE DE ENTORNO
      - MYSQL_PASSWORD=pass           #TODO: CAMBIAR POR VARIABLE DE ENTORNO
    ports:
      - "3306:3306"
    volumes:
      # PERSISTENCIA: Se guarda en el sistema de archivos en lugar del contenedor
      - ./mariadb_data:/var/lib/mysql
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 150M # RAM maxima por ahora

#    SERVICIOS DE NEGOCIO

  orchestrator:
    build:
      context: ..
      dockerfile: Orchestrator/Dockerfile
    container_name: orchestrator
    ports:
      - "8082:8082"
    depends_on:
      config-service-v3:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service-v3:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MULTIPLIER=1.5
      - NATS_URL=nats://nats-server:4222
    volumes:
      - ./logs/usuarios-ms:/app/logs
    networks:
      - microservices-network

    # --- AUCTION SERVICE ---
  auction-service:
    build:
      context: ..
      dockerfile: AuctionService/Dockerfile
    container_name: auction-service
    ports:
      - "8081:8081"
    depends_on:
      config-service-v3:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service-v3:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MULTIPLIER=1.5
      - NATS_URL=nats://nats-server:4222
    volumes:
      - ./logs/usuarios-ms:/app/logs
    networks:
      - microservices-network

    # --- BFF ---
  bff:
    build:
      context: ..
      dockerfile: BFF/Dockerfile
    container_name: bff
    ports:
      - "8083:8083"
    depends_on:
      config-service-v3:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service-v3:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MULTIPLIER=1.5
      - NATS_URL=nats://nats-server:4222
#      - SPRING_DATASOURCE_USERNAME=admin_user
#      - SPRING_DATASOURCE_PASSWORD=pass
      - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/app_db
    volumes:
      - ./logs/usuarios-ms:/app/logs
    networks:
      - microservices-network

    # --- PropertyService ---
  property-service:
    build:
      context: ..
      dockerfile: PropertyService/Dockerfile
    container_name: property-service
    ports:
      - "8084:8084"
    depends_on:
      config-service-v3:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service-v3:8888
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS=20
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=2000
      - SPRING_CLOUD_CONFIG_RETRY_MULTIPLIER=1.5
      - NATS_URL=nats://nats-server:4222
    volumes:
      - ./logs/usuarios-ms:/app/logs
    networks:
      - microservices-network
