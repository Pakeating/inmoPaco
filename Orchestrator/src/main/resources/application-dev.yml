info:
  config-source: "local"
  env-type: "local"

spring:
  application:
    name: orchestrator-local
  config:
    import: "optional:configserver:http://localhost:8888"
  boot:
    admin:
      client:
        url: "http://localhost:9090/admin"
  cloud:
    config:
      override-none: false
      allow-override: true
      override-system-properties: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
      post:
        enabled: true

nats:
  url: nats://localhost:4222
  durable-name: OrchestratorService

logging:
  file:
    name: logs/orchestrator.log



server:
  port: 7082