info:
  config-source: "local"
  env-type: "local"

spring:
  application:
    name: orchestrator
  config:
    import: "optional:configserver:http://config-service-v3:8888"
  boot:
    admin:
      client:
        url: "http://admin-server:9090/admin"
  cloud:
    config:
      override-none: false
      allow-override: true
      override-system-properties: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
      post:
        enabled: true

logging:
  file:
    name: logs/orchestrator.log

server:
  port: 8082