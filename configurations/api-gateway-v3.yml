server:
  port: 8080
  cloud:
    gateway:
      routes:
        - id: admin-server
          uri: http://admin-server:9090
          predicates:
            - Path=/admin/**
          filters:
            - PreserveHostHeader
            - name: CircuitBreaker
              args:
                name: AdminServer

# Configuración de Resiliencia (Circuit Breaker)
resilience4j:
  circuitbreaker:
    configs:
      # Plantilla de configuracion general
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
      instances:
        AdminServer:
          baseConfig: default
        Auctions:
          baseConfig: default
# Observabilidad y Logs
management:
  tracing:
    sampling:
      probability: 1.0 # 100% de trazas para desarrollo
  endpoints:
    web:
      exposure:
        include: "*" # Exponemos todo para Spring Boot Admin

