# Configuración de Resiliencia (Circuit Breaker)
resilience4j:
  circuitbreaker:
    instances:
      usuariosCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

# Observabilidad y Logs
management:
  tracing:
    sampling:
      probability: 1.0 # 100% de trazas para desarrollo
  endpoints:
    web:
      exposure:
        include: "*" # Exponemos todo para Spring Boot Admin

